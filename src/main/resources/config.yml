#Do not edit this
version: 3

PlayerJoin:
  enable: true
  name: "&f{eventPlayer}"
  prefix: "&8[&a+&8] "
  suffix:
  actions:
    click:
      type: "suggest"
      #run/suggest
      action: "{eventPlayer}, Hi"
    auto:
      type: "console"
      #console/player
      action: "/tell {eventPlayer} Hi"
PlayerExit:
  enable: true
  name: "&f{eventPlayer}"
  prefix: "&8[&c-&8] "
  suffix:
  actions:
    click:
      type: "suggest"
      #run/suggest
      action: "{eventPlayer}, Bye~"
    auto:
      type: "console"
      #console/player
      action: "/tell {eventPlayer} Bye~"
FirstJoin:
  enable: true
  name: "&f{eventPlayer}"
  prefix: "&8[&b+&8] "
  suffix:
  actions:
    click:
      type: "suggest"
      #run/suggest
      action: "{eventPlayer}, Welcome to our server"
    auto:
      type: "console"
      #console/player
      action: "/tell {eventPlayer} Welcome to our server"